
<!DOCTYPE html>
<html>
<head>
    <title>Inkscape Output</title>
</head>
<body>
    <canvas id='canvas' width='210' height='297'></canvas>
    <script>
    var ctx = document.getElementById("canvas").getContext("2d");
    	
// #layer1
	
// #rect1
	ctx.beginPath();
	ctx.strokeStyle = 'rgb(0, 0, 1)';
	ctx.lineWidth = 0.079375;
	ctx.rect(28.547306, 136.021640, 93.178810, 6.809218);
	ctx.stroke();
	
// #rect2
	ctx.save();
	ctx.beginPath();
	ctx.transform(1.000000, 0.000000, -0.670771, 0.741664, 0.000000, 0.000000);
	ctx.strokeStyle = 'rgb(0, 0, 1)';
	ctx.lineWidth = 0.092168;
	ctx.rect(151.352130, 123.943150, 93.895576, 59.434914);
	ctx.stroke();
	ctx.restore();
	
// #path2
	ctx.beginPath();
	ctx.strokeStyle = 'rgb(0, 0, 1)';
	ctx.lineWidth = 0.079375;
	ctx.moveTo(121.009280, 142.114460);
	ctx.lineTo(161.864610, 98.033524);
	ctx.lineTo(161.506230, 91.224302);
	ctx.stroke();
	
// #path3
	ctx.beginPath();
	ctx.strokeStyle = 'rgb(0, 0, 1)';
	ctx.lineWidth = 0.079375;
	ctx.moveTo(92.462055, 113.606480);
	ctx.lineTo(43.005607, 180.981930);
	ctx.stroke();
	
// #path4
	ctx.beginPath();
	ctx.strokeStyle = 'rgb(0, 0, 1)';
	ctx.lineWidth = 0.079375;
	ctx.moveTo(39.063427, 123.641120);
	ctx.lineTo(132.959000, 123.461930);
	ctx.stroke();
	
// #path5
	ctx.beginPath();
	ctx.strokeStyle = 'rgb(0, 0, 1)';
	ctx.lineWidth = 0.079375;
	ctx.moveTo(46.768596, 114.860810);
	ctx.lineTo(140.843360, 114.860810);
	ctx.stroke();

    </script>
</body>
</html>
